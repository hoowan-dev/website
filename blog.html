<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juan Becerra | Blog</title>
  <meta name="description" content="Blog page for Juan Becerra, sharing thoughts on software engineering and game development." />
  <link rel="stylesheet" href="styles.css" />
  <script src="js/components.js" defer></script>
</head>
<body id="top">
  <div class="page-shell">
    <header class="site-header"></header>

    <main class="hero-layout centered-hero">
      <section class="hero-panel">
        <h1>Blog</h1>
        <p class="hero-copy">Here's some of my noteworthy technical, research, and game design posts.</p>
      </section>
    </main>

    <section class="section">
      <div class="section-inner">
        <div class="skill-grid">
          <article class="experience-card">
            <img src="media/blog/motion-matching/10.png" alt="ML-Driven Animation" class="project-image">
            <div class="item-header">
              <div>
                <h3><a href="#">ML-Driven Animation</a></h3>
                <p class="item-subtitle">Moving beyond traditional state-machine driven animations to develop complex and scalable locomotion</p>
              </div>
              <span>May 2021
              </span>

            <div class="experience-details" data-content-url="subpage-content/ml-driven-animation.html"></div>

        </div>
      </div>

    <footer class="footer"></footer>
    <a href="#top" class="back-to-top" aria-label="Back to top">↑</a>

    <div class="project-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Project details">
      <div class="project-modal-backdrop" data-modal-close></div>
      <div class="project-modal-card">
        <button type="button" class="project-modal-close" aria-label="Close project details">×</button>
        <img class="project-modal-image" src="" alt="" style="display: none;">
        <h2 class="project-modal-title"></h2>
        <p class="project-modal-subtitle"></p>
        <span class="project-modal-date"></span>
        <div class="project-modal-description"></div>
      </div>

    <script src="js/portfolio.js" defer></script>
